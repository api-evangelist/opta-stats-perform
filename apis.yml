aid: opta-stats-perform
name: Stats Perform
description: >-
  Stats Perform is a global sports data, AI, and technology company formed by
  the 2019 merger of Stats LLC and the Perform Group. The company owns and
  operates the Opta brand, the de facto standard for granular football
  (soccer) event data, and supplies live data, advanced metrics, predictive
  models, video, graphics, and AI-powered content to media broadcasters,
  sportsbooks, fantasy operators, professional clubs, leagues, governing
  bodies, and brands. Its product portfolio is organised around three
  customer segments — Media & Tech, Betting & Fantasy, and Team Performance
  — and exposes data and AI capabilities through a family of Opta-branded
  products including Opta Feeds (XML/JSON sports data feeds), Opta Live
  (live event data), Opta Stream (low-latency push), Opta Vision
  (computer-vision tracking), Opta Predictions (probability models), Opta
  Points (player ratings), Opta Pulse (event commentary), Opta Stories
  (auto-generated narratives), Opta Search (natural-language sports
  search), Opta Graphics (broadcast graphics), and OptaAI Studio (AI
  content tooling). Access to Opta data and APIs is partner-gated:
  prospective customers must contract through Stats Perform sales, and
  developer documentation, schemas, and reference material are delivered
  through a private customer portal rather than a public developer area.
  Stats Perform also operates StatsBomb's competitors The Analyst as a
  public-facing editorial property, and runs the annual Opta Forum for
  customers and analysts.
